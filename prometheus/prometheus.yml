global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "clickhouse"
    static_configs:
      - targets: ["10.23.4.203:9363"]  # замените "localhost" на IP-адрес сервера, если ClickHouse не на локальной машине
    metrics_path: "/metrics"  # путь, который был настроен для метрик
    honor_labels: true

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["10.23.4.203:15692"]
    metrics_path: "/metrics"
    scheme: http
    honor_labels: true

  - job_name: 'tracking'
    static_configs:
      - targets: ["84.201.143.187:8005"]  # Указываем контейнер и порт для сбора метрик
    metrics_path: "/metrics"
    scheme: http
    honor_labels: true
  
  - job_name: 'local_python_scripts'
    static_configs:
      - targets: ["10.23.4.203:8003"]  # Указываем контейнер и порт для сбора метрик
    metrics_path: "/metrics"
    scheme: http
    honor_labels: true

  - job_name: "cadvisor"
    static_configs:
      - targets: ["10.23.4.203:8080"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["10.23.4.203:9100"]
    metrics_path: "/metrics"
    scheme: http
    honor_labels: true
  
  - job_name: "nifi_metrics"
    static_configs:
      - targets: ["10.23.4.203:9092"]
    metrics_path: "/metrics"
    scheme: http
    honor_labels: true
